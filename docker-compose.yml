services:
  web:
    build: .
    ports:
      - "8000:8000"
    # 1. Gỡ bỏ hoặc comment volumes nếu bạn muốn dùng tính năng 'watch' chuyên sâu
    # volumes:
    #   - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    # 2. Thêm cấu hình watch để Docker tự đồng bộ file từ WSL vào Container
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
            - __pycache__/

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --token <YOUR_CLOUDFLARE_TOKEN>
    depends_on:
      - web
